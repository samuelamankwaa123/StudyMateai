<!DOCTYPE html>

<html>
<head>
    <title>StudyMate AI</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .chat { max-width: 600px; margin: auto; }
        .msg { margin: 10px 0; }
        .user { color: blue; }
        .bot { color: green; }
    </style>
</head>
<body>
<div class="chat">
    <h2>StudyMate AI</h2>

```
{% for chat in chat_history %}
    <div class="msg user"><b>You:</b> {{ chat.user }}</div>
    <div class="msg bot"><b>Bot:</b> {{ chat.assistant }}</div>
{% endfor %}

<form method="POST">
    <input name="message" placeholder="Ask something..." required>
    <button type="submit">Send</button>
</form>

<form method="POST">
    <button name="clear">Clear Chat</button>
</form>

<p style="color:red;">{{ error }}</p>
```

</div>
</body>
</html>
